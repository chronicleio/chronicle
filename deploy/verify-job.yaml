apiVersion: batch/v1
kind: Job
metadata:
  name: lyra-verify
  namespace: lyra
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: lyra-verify
    spec:
      restartPolicy: Never
      containers:
        - name: verify
          image: lyra-unit:dev
          imagePullPolicy: IfNotPresent
          command: ["lyra", "verify"]
          args:
            - --catalog=oxia:6648
            - --timelines=4
            - --rate=100
            - --replication-factor=3
            - --payload-size=256
            - --report-interval=5
            - --units=http://lyra-unit-0.lyra-unit-headless.lyra.svc.cluster.local:7070,http://lyra-unit-1.lyra-unit-headless.lyra.svc.cluster.local:7070,http://lyra-unit-2.lyra-unit-headless.lyra.svc.cluster.local:7070
