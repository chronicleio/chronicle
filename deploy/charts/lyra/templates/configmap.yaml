apiVersion: v1
kind: ConfigMap
metadata:
  name: lyra-config
  labels:
    app.kubernetes.io/name: lyra
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  unit.toml: |
    io_mode = "{{ .Values.unit.ioMode }}"

    [server]
    bind_address = "{{ .Values.unit.server.bindAddress }}"

    [wal]
    dir = "/data/wal"

    [storage]
    dir = "/data/storage"

    [segments]
    dir = "/data/segments"

    [log]
    level = "{{ .Values.log.level }}"
