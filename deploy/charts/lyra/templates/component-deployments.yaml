{{- end }}
{{- if .Values.query.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lyra-query
  labels:
    app.kubernetes.io/name: lyra-query
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.query.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: lyra-query
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lyra-query
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: query
          image: "{{ .Values.query.image.repository }}:{{ .Values.query.image.tag }}"
          imagePullPolicy: {{ .Values.query.image.pullPolicy }}
          command: ["lyra"]
          args: ["query", "start", "--config", "/etc/lyra/lyrad.toml"]
          ports:
            - containerPort: 50051
              name: flight-sql
          volumeMounts:
            - name: config
              mountPath: /etc/lyra
          resources:
            {{- toYaml .Values.query.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: lyra-config
{{- end }}
