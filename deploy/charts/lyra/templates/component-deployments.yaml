{{- if .Values.orchestrator.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lyra-orchestrator
  labels:
    app.kubernetes.io/name: lyra-orchestrator
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.orchestrator.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: lyra-orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lyra-orchestrator
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: orchestrator
          image: "{{ .Values.orchestrator.image.repository }}:{{ .Values.orchestrator.image.tag }}"
          imagePullPolicy: {{ .Values.orchestrator.image.pullPolicy }}
          command: ["lyra"]
          args: ["orch", "start", "--config", "/etc/lyra/conf/orchestrator.toml"]
          ports:
            - containerPort: 50051
              name: flight-sql
          volumeMounts:
            - name: config
              mountPath: /etc/lyra/conf
          resources:
            {{- toYaml .Values.orchestrator.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: lyra-config
{{- end }}
