{{- if .Values.xunit.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lyra-xunit
  labels:
    app.kubernetes.io/name: lyra-xunit
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.xunit.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: lyra-xunit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lyra-xunit
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: xunit
          image: "{{ .Values.xunit.image.repository }}:{{ .Values.xunit.image.tag }}"
          imagePullPolicy: {{ .Values.xunit.image.pullPolicy }}
          command: ["lyra"]
          args: ["xunit", "start", "--config", "/etc/lyra/lyrad.toml"]
          volumeMounts:
            - name: config
              mountPath: /etc/lyra
          resources:
            {{- toYaml .Values.xunit.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: lyra-config
{{- end }}
{{- if .Values.connector.enabled }}
