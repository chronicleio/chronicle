apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: lyra-unit
  labels:
    app.kubernetes.io/name: lyra-unit
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  serviceName: lyra-unit-headless
  replicas: {{ .Values.unit.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: lyra-unit
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lyra-unit
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: unit
          image: "{{ .Values.unit.image.repository }}:{{ .Values.unit.image.tag }}"
          imagePullPolicy: {{ .Values.unit.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              POD_DNS="$(hostname).lyra-unit-headless.{{ .Release.Namespace }}.svc.cluster.local"
              sed "s/\[server\]/[server]\nadvertise_address = \"http:\/\/${POD_DNS}:7070\"/" /etc/lyra/conf/unit.toml > /tmp/unit.toml
              exec lyra unit start --config /tmp/unit.toml
          ports:
            - containerPort: 7070
              name: grpc
            - containerPort: 7071
              name: metrics
          volumeMounts:
            - name: config
              mountPath: /etc/lyra/conf
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.unit.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: 7070
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 7070
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: lyra-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.unit.storage.size }}
