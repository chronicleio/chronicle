syntax = "proto3";

package io.lyra.proto.admin.v1;

service Admin {
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
  rpc ListSegments(ListSegmentsRequest) returns (ListSegmentsResponse);
  rpc TriggerCompaction(TriggerCompactionRequest) returns (TriggerCompactionResponse);
}

// ── GetStatus ─────────────────────────────────────────────────────

message GetStatusRequest {}

message GetStatusResponse {
  string state = 1;            // "WRITABLE", "READONLY"
  uint64 wal_segment_id = 2;
  uint64 wal_checkpoint_segment = 3;
  uint64 write_cache_entries = 4;
  DiskUsage disk = 5;
}

message DiskUsage {
  uint64 total_bytes = 1;
  uint64 available_bytes = 2;
  uint64 wal_bytes = 3;
  uint64 segment_bytes = 4;
  uint64 index_bytes = 5;
}

// ── ListSegments ──────────────────────────────────────────────────

message ListSegmentsRequest {
  // Optional: filter by level (0 = all levels).
  uint32 level = 1;
}

message ListSegmentsResponse {
  repeated SegmentInfo segments = 1;
}

message SegmentInfo {
  uint64 id = 1;
  uint32 level = 2;
  uint64 size = 3;
  uint64 entry_count = 4;
  bool remote = 5;
}

// ── TriggerCompaction ─────────────────────────────────────────────

message TriggerCompactionRequest {
  // Target level to compact (2 = L2 merge, 3 = L3 split).
  uint32 level = 1;
}

message TriggerCompactionResponse {
  bool triggered = 1;
  string message = 2;
}
