syntax = "proto3";

package io.lyra.proto.storage.v1;
import "pb_external.proto";


message EventEntryMeta {
  int64 timeline_id = 1;
  int64 term = 2;
  int64 offset = 3;
  uint32 crc32 = 5;
  int64 timestamp = 6;
  int64 payload_size = 7;
  int64 schema_id = 8;
}

message SegmentMeta {
  uint64 id = 1;
  uint32 level = 2;
  uint64 size = 3;
  uint64 entry_count = 4;
  SegmentLocation location = 5;
  int64 created_at = 6;
}

message SegmentLocation {
  oneof kind {
    LocalSegment local = 1;
    RemoteSegment remote = 2;
  }
}

message LocalSegment {
  string path = 1;
}

message RemoteSegment {
  string key = 1;
}